<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Montar Kit de Produtos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; color: #333; }
        .form-container { max-width: 650px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 0 auto; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { padding: 12px; background-color: #ff6b81; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #ff4757; }
        .voltar { display: inline-block; margin-bottom: 20px; color: #ff6b81; text-decoration: none; font-weight: bold; }
        
        .secao-itens-kit { margin-top: 25px; padding-top: 20px; border-top: 2px dashed #ccc; }
        .linha-item-kit { display: grid; grid-template-columns: 4fr 1fr auto; gap: 10px; margin-bottom: 12px; align-items: end; background: #f9f9fb; padding: 10px; border-radius: 6px; }
        .btn-adicionar { background-color: #2ed573; margin-bottom: 15px; font-size: 14px; padding: 8px; }
        .btn-adicionar:hover { background-color: #26af5f; }
        .btn-remover { background-color: #ff4757; padding: 10px; font-size: 14px; height: 40px; }
    </style>
</head>
<body>

    <div class="form-container">
        <a href="../../index.html" class="voltar">← Voltar para a Loja</a>
        <h2>Montar Novo Kit (Combo de Roupas)</h2>
        
        <form id="form-kit">
            <div class="form-group">
                <label for="kit-nome">Nome do Kit</label>
                <input type="text" id="kit-nome" required placeholder="Ex: Kit Verão - Camiseta + Short Brim">
            </div>

            <div class="form-group">
                <label for="kit-descricao">Descrição do Combo</label>
                <textarea id="kit-descricao" rows="3" placeholder="Descreva as peças que compõem este lindo kit promocional..."></textarea>
            </div>

            <div class="form-group">
                <label for="kit-preco">Preço do Kit Promocional (R$)</label>
                <input type="number" id="kit-preco" step="0.01" required placeholder="0,00">
            </div>

            <div class="form-group">
                <label for="kit-categoria">Categoria do Kit</label>
                <select id="kit-categoria" required>
                    <option value="1">Verão</option>
                    <option value="2">Inverno</option>
                    <option value="3">Meia-Estação</option>
                </select>
            </div>

            <div class="form-group">
                <label for="kit-genero">Gênero do Kit</label>
                <select id="kit-genero" required>
                    <option value="1">Menino</option>
                    <option value="2">Menina</option>
                    <option value="3">Unissex</option>
                </select>
            </div>

            <div class="form-group">
                <label for="kit-fotos">Fotos do Kit Montado (Selecione uma ou mais)</label>
                <input type="file" id="kit-fotos" accept="image/*" multiple required>
            </div>

            <div class="secao-itens-kit">
                <h3>Produtos Inclusos neste Kit</h3>
                <button type="button" id="btn-add-item-kit" class="btn-adicionar">+ Vincular Produto ao Kit</button>
                <div id="container-itens-kit"></div>
            </div>

            <button type="submit" style="width: 100%; margin-top: 30px;">Salvar Kit Promocional</button>
        </form>
    </div>

    <script type="module" src="./salvarKits.js"></script>
</body>
</html>
